# Server Configuration
server.port=8080
spring.application.name=genome-assembler-api

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.genome.api=INFO
logging.level.org.springframework.web=INFO

# CORS (additional to code-based config)
spring.web.cors.allowed-origins=http://localhost:3000,https://debruijn-genome-assembler.vercel.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*